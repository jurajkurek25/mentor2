<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sprievodca — (Ne)potrebný muž</title>
<link rel="stylesheet" href="/css/style.css">
<style>
  .page { width: 100%; max-width: 640px; padding: 0 20px 24px; display: flex; flex-direction: column; min-height: 100vh; }
  .hero { text-align: center; padding: 40px 0 8px; }
  .hero-sub { font-family: 'Cormorant Garamond', serif; font-size: .85rem; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-top: 10px; }

  .chat-window {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 16px;
    overflow-y: auto;
    padding: 16px 4px;
    min-height: 300px;
  }
  .msg { max-width: 85%; line-height: 1.7; font-size: 1.05rem; padding: 14px 18px; }
  .msg.user { align-self: flex-end; background: rgba(184,146,58,.12); border: 1px solid var(--rule); color: var(--paper); }
  .msg.assistant { align-self: flex-start; background: rgba(255,255,255,.03); border-left: 2px solid var(--gold); color: #d0c4ae; }
  .msg.assistant strong { color: var(--paper); }
  .msg.pending { color: var(--muted); font-style: italic; }

  .empty-state { text-align: center; color: var(--muted); font-style: italic; font-size: 1.05rem; margin: 40px 0; line-height: 1.8; }

  .input-row { display: flex; gap: 10px; margin-top: 12px; position: sticky; bottom: 0; }
  .input-row textarea { flex: 1; resize: none; height: 54px; }
  .input-row button { white-space: nowrap; }

  footer { text-align: center; font-size: .75rem; color: var(--muted); opacity: .6; margin-top: 20px; }

  .account-bar { display: flex; justify-content: space-between; align-items: center; gap: 10px; font-size: .82rem; color: var(--muted); padding: 10px 0; border-bottom: 1px solid var(--rule); flex-wrap: wrap; }
  .account-bar a, .account-bar button.link-btn { color: var(--gold); text-decoration: none; background: none; border: none; font-family: inherit; font-size: inherit; cursor: pointer; padding: 0; }
  .account-bar a:hover, .account-bar button.link-btn:hover { color: var(--gold-lt); }

  .paywall { display: none; background: rgba(184,146,58,.08); border: 1px solid var(--rule); padding: 20px; margin: 16px 0; text-align: center; }
  .paywall p { margin-bottom: 14px; line-height: 1.6; }
  .plans { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin-bottom: 10px; }
  .plan-card { flex: 1; min-width: 150px; border: 1px solid var(--rule); padding: 16px; }
  .plan-card h3 { font-family: 'Cormorant Garamond', serif; font-weight: 400; color: var(--gold-lt); margin-bottom: 6px; }
  .plan-card .price { font-size: 1.3rem; margin-bottom: 4px; }
  .plan-card .tokens { font-size: .78rem; color: var(--muted); margin-bottom: 12px; }
</style>
</head>
<body>
<main class="page">
  <div class="account-bar" id="accountBar"></div>

  <div class="hero">
    <span class="eyebrow">(Ne)potrebný muž</span>
    <h1>Spýtaj sa <span class="gold">Sprievodcu</span></h1>
    <p class="hero-sub">Odpovede postavené na knihách o mužstve</p>
  </div>

  <div class="paywall" id="paywall">
    <p id="paywallMessage"></p>
    <div class="plans" id="plans"></div>
  </div>

  <div class="ornament">
    <svg viewBox="0 0 24 24"><path d="M12 2L9.5 9H2l6 4.5L5.5 21 12 16.5 18.5 21 16 13.5l6-4.5h-7.5z"/></svg>
  </div>

  <div id="chatWindow" class="chat-window">
    <p class="empty-state">Napíš otázku o mužstve, vzťahoch, sebadisciplíne alebo zmysle — Sprievodca odpovie na základe kníh, ktoré má naštudované.</p>
  </div>

  <div class="input-row">
    <textarea id="messageInput" placeholder="Napíš svoju otázku…"></textarea>
    <button id="sendBtn" class="cta-btn">Odoslať</button>
  </div>

  <footer>© 2026 Juraj Augustín Kurek · Ngroup s.r.o.</footer>
</main>

<script src="/js/account.js"></script>
<script src="/js/chat.js"></script>
</body>
</html>
